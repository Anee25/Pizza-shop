<html>
<head>
<style>
p{font-size:20px}
body {
  background-image: url("bg11.jpeg");         
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;                 
       }
	.form-box { 
      max-width: 400px; 
      margin: auto; 
      border: 3px solid #ccc; 
      border-radius: 8px; 
      padding: 15px; 
      margin-top:20px;
    }
</style>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<title>Ann's Pizza Shop</title>
	<script>
	function validationform()
	{
	let name=document.getElementById("uname").value;
	let address=document.getElementById("address").value;
	let item=document.getElementById("pizza").value;
	let quantity=document.getElementById("quantity").value;	         
	let mobile = document.getElementById("phone").value;

	if(name===""||address==="")
	{
		alert("Please enter Username & address.");
		return false;
	}
	if(item===""||quantity==="")
	{
		alert("Please enter item & quantity.");
		return false;
	}
	 if (isNaN(mobile)||mobile==="") {
                alert("Mobile number must contain only digits");
                return false;
	}
		alert("Order Placed Successful!");
		return true;
	}
	</script>
</head>
<body>
	<div class="container">
	<h1>Order Now From Ann's Pizza Shop</h1>
	 <form action="thank.html" onsubmit="return validationform()" class="container form-box">
	<label for="uname">User Name:</label>
	<input type="text" id="uname" name="uname" placeholder="Enter Your User Name" class="form-control"><br>
	<label for="mobile">Phone Number:</label>
	<input type="tel" id="phone" name="phone"  placeholder="Enter Your Phone Number" class="form-control"><br>
	<label for="address">Delivery Address:</label>
	<input type="text" id="address" name="address" class="form-control"></input><br>
	<label for="item">Choose a Pizza Item:</label>
	<select name="pizza" id="pizza" class="form-select"> 
	   <option value="margherita">Margherita Pizza</option> 
	   <option value="cheesencorn">Cheese N Corn Pizza</option> 
	   <option value="paneer">Paneer Makhani Pizza</option> 
	   <option value="pepperoni">Pepperoni Pizza</option> 
	   <option value="peppy">Peppy Paneer Pizza</option>
	   <option value="tandoori">Tandoori Paneer Pizza</option>
	</select> <br>
	<label for="quantity">Quantity:</label>
	   <select id="quantity" name="quantity" class="form-select">
	     <option>1</option>
	     <option>2</option>
	     <option>3</option>
	     <option>4</option>
	     <option>5</option>
	     <option>6</option>
	   </select><br>
	<label for="size">Size:</label>
	   <select id="size" name="size" class="form-select">
	     <option>Small</option>
	     <option>Medium</option>
	     <option>Large</option>
	   </select><br>
	<button type="submit">Placed Order</button>
	<button type="reset">Reset</button>
	</form>
	<p>
		<a href="index.html">Back To Home</a>
	</p>
	</div>
<footer class="bg-dark text-white text-center p-3 mt-4">
		<p>“Good vibes and great pizza—always fresh, always for you.”
</p>
</footer>
</body>
</html>
