<html>
<head>
	<title>Login-Ann's Pizza Shop</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="stylesheet" href="D:\bootstrap.min.css">
	<script>
    function validateLogin() {
      let user = document.getElementById("user").value;
      let pass = document.getElementById("pass").value;

      if (user === "" || pass === "") {
        alert("Please enter Username and Password");
        return false;
      }
      localStorage.setItem("username", user);
      window.location.href = "welcomeweb2.html";
      return false;
    }
  </script>
	<style>
	.form-box { 
      max-width: 400px; 
      margin: auto; 
      border: 3px solid #ccc; 
      border-radius: 8px; 
      padding: 15px; 
      margin-top:20px;
    }
	body {
  background-image: url("bg11.jpeg");         
  background-size:cover;                 
  background-position: center;                      
         }

    </style>
</head>
<body>
	<div class="container">
	<div style="display:flex;gap:10px; margin:20px 0;">
	<img src="logo.jpeg" alt="logo" style="height:125px;">
	<div style="display:flex";flex-direction:column;text-align:left;">
	<div style="font-size:30px; font-weight:bold;">Ann's Pizza Shop</div><br><br>
	</div>
	</div>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Pizza Shop</a>
      <ul class="nav">
        <li class="nav-item"><a class="nav-link" href="registration.html">Register</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>
	
  <h2 class="text-center">Customer Login</h2>
  <form action="home.html" onsubmit="return validateLogin()" class="container form-box">
    <label>Username:</label>
    <input type="text" id="user" class="form-control">

    <label>Password:</label>
    <input type="password" id="pass" class="form-control"><br>
	<form action="registration.html">
    <button type="submit" class="btn btn-success">Login</button>
    <button type="reset">Reset</button>
  </form>
	
</body>		
</html>
